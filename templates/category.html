{% extends "base.html" %}

{% block content %}
<h2>{{ category['categoryName'] }}</h2>

<div class="book-grid">
    {% for book in books %}
        <div class="card">
            <img src="{{ url_for('static', filename='images/' + book['image']) }}" alt="{{ book['title'] }}">
            <h3>{{ book['title'] }}</h3>
            <p><strong>Author:</strong> {{ book['author'] }}</p>
            <p><strong>Price:</strong> ${{ "%.2f"|format(book['price']) }}</p>

            {% if book['readNow'] == 1 %}
                <p class="badge">Read Now</p>
            {% endif %}

            <a href="{{ url_for('book_detail', book_id=book['bookId']) }}">View Details</a>
        </div>
    {% endfor %}
</div>
{% endblock %}
